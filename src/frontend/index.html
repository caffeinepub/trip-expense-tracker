<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Trip Expense Tracker</title>

    <!-- PWA Meta Tags -->
    <meta name="application-name" content="Trip" />
    <meta name="description" content="Split trip expenses among friends easily" />
    <meta name="theme-color" content="#0f1729" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Trip" />

    <!-- Manifest -->
    <link rel="manifest" href="./manifest.json" />

    <!-- Icons -->
    <link rel="apple-touch-icon" sizes="192x192" href="./assets/generated/icon-192.dim_192x192.png" />
    <link rel="apple-touch-icon" sizes="512x512" href="./assets/generated/icon-512.dim_512x512.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="./assets/generated/icon-192.dim_192x192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="./assets/generated/icon-512.dim_512x512.png" />

    <!-- Open Graph for sharing -->
    <meta property="og:title" content="Trip Expense Tracker" />
    <meta property="og:description" content="Split trip expenses among friends easily" />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="./assets/generated/icon-512.dim_512x512.png" />

    <!-- Register Service Worker early -->
    <script>
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('./sw.js').catch(() => {});
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
